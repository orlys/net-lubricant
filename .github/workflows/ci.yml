name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'
      - name: Restore
        run: dotnet restore NetLubricant.slnx
      - name: Build
        run: dotnet build NetLubricant.slnx -c Release --no-restore
      - name: Pack
        run: dotnet pack src/NetLubricant/NetLubricant.csproj -c Release --no-build -o ./artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: ./artifacts/*.nupkg
